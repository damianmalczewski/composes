name: azurite

services:

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    ports:
      - "127.0.0.1:10000:10000" # blob service
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000"
    volumes:
      - azurite_data:/data
    networks:
      - azurite
    healthcheck:
      test: ["CMD", "nc", "0.0.0.0", "10000", "-z"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  azurite:

volumes:
  azurite_data:
