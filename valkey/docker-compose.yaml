name: valkey

services:

  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  valkey:

volumes:
  valkey_data:
