name: cassandra

services:

  cassandra:
    image: cassandra:5.0
    ports:
      - "127.0.0.1:9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "SingleNodeCluster"
      CASSANDRA_DC: "dc1"
      CASSANDRA_RACK: "rack1"
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - cassandra
    volumes:
      - cassandra_data:/var/lib/cassandra
    restart: unless-stopped

networks:
  cassandra:

volumes:
  cassandra_data:
