name: elasticsearch

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    environment:
      discovery.type: single-node
      http.cors.enabled: "true"  # cors only for local env, for elasticvue UI tool
      http.cors.allow-origin: "/.*/"
      http.cors.allow-headers: "X-Requested-With,Content-Type,Content-Length,Authorization"
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elasticsearch
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  elasticvue:
    image: cars10/elasticvue:1.15.0
    ports:
      - "127.0.0.1:9201:8080"
    environment:
      ELASTICVUE_CLUSTERS: '[{"name": "local cluster", "uri": "http://127.0.0.1:9200"}]'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      elasticsearch:
        condition: service_healthy

networks:
  elasticsearch:

volumes:
  elasticsearch_data:
