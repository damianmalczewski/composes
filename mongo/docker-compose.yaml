name: mongo

services:

  mongo:
    image: mongo:8.2
    ports:
      - "127.0.0.1:27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - "mongo_data:/data/db"
      - "mongo_config:/data/configdb"
    networks:
      - mongo
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongo-init-job:
    image: mongo:8.2
    command: >
      mongosh --host mongo --port 27017 --quiet --eval
      "try { rs.status() } catch (err) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}) }"
    networks:
      - mongo
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

networks:
  mongo:

volumes:
  mongo_data:
  mongo_config:
